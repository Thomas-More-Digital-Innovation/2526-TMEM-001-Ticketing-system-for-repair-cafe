name: Release Helm chart to GHCR

on:
  push:
    branches:
      - main
    paths:
      - code/rc-app/helm/repaircafe/**
      - .github/workflows/release-helm-chart.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release-chart:
    runs-on: ubuntu-latest

    env:
      CHART_DIR: code/rc-app/helm/repaircafe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Compute chart metadata
        id: meta
        run: |
          CHART_NAME="$(helm show chart "$CHART_DIR" | awk -F': ' '/^name:/ {print $2; exit}')"
          CHART_VERSION="$(helm show chart "$CHART_DIR" | awk -F': ' '/^version:/ {print $2; exit}')"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO="${REPO,,}"
          while [[ "$REPO" =~ [._-]$ ]]; do REPO="${REPO%?}"; done
          OCI_REPO="ghcr.io/$OWNER/$REPO/charts"

          echo "chart_name=$CHART_NAME" >> "$GITHUB_OUTPUT"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "oci_repo=$OCI_REPO" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Check if chart version already exists
        id: exists
        run: |
          if helm pull "oci://${{ steps.meta.outputs.oci_repo }}/${{ steps.meta.outputs.chart_name }}" --version "${{ steps.meta.outputs.chart_version }}" --destination /tmp >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Chart version already exists in GHCR, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package chart
        if: steps.exists.outputs.exists == 'false'
        run: helm package "$CHART_DIR" --destination /tmp

      - name: Push chart to GHCR
        if: steps.exists.outputs.exists == 'false'
        run: |
          helm push \
            "/tmp/${{ steps.meta.outputs.chart_name }}-${{ steps.meta.outputs.chart_version }}.tgz" \
            "oci://${{ steps.meta.outputs.oci_repo }}"
