apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repaircafe.fullname" . }}
  labels:
    {{- include "repaircafe.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "repaircafe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "repaircafe.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "repaircafe.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - >-
              until pg_isready -h {{ include "repaircafe.postgresHost" . }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }};
              do echo waiting for postgres; sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "repaircafe.postgresSecretName" . }}
                  key: password
        {{- if .Values.app.uploads.enabled }}
        - name: init-uploads-dir
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - mkdir -p /uploads/{{ default "uploads" .Values.app.uploads.subPath }} && chmod 755 /uploads/{{ default "uploads" .Values.app.uploads.subPath }}
          volumeMounts:
            - name: uploads
              mountPath: /uploads
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "repaircafe.postgresSecretName" . }}
                  key: databaseUrl
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "repaircafe.appSecretName" . }}
                  key: sessionSecret
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.app.uploads.enabled }}
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
              subPath: {{ default "uploads" .Values.app.uploads.subPath | quote }}
          {{- end }}
      {{- if .Values.app.uploads.enabled }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "repaircafe.uploadsPvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
